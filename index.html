<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Landing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Georgia', serif;
}

body {
    height:100vh;
    overflow:hidden;
}

/* BACKGROUND */
.hero {
    position:relative;
    width:100%;
    height:100vh;
    background: url('https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17') no-repeat center/cover;
}

/* OVERLAY GELAP */
.hero::after {
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(20,10,5,0.9));
}

/* GLOW EFFECT */
.glow {
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    width:400px;
    height:400px;
    background: radial-gradient(circle, rgba(255,140,0,0.4), transparent);
    filter: blur(80px);
    z-index:1;
}

/* CARD */
.content {
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    background:#f5f0eb;
    padding:40px 60px;
    border-radius:6px;
    text-align:center;
    z-index:2;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* TEXT */
.content h1 {
    font-size:36px;
    letter-spacing:2px;
    margin-bottom:15px;
}

.content p {
    font-style:italic;
    font-size:18px;
    color:#333;
}

/* LOGO TEXT */
.logo {
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    z-index:2;
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity:0;
        transform:translateY(40px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}

.content {
    animation: fadeUp 1.5s ease;
}

</style>
</head>

<body>

<div class="hero">

    <!-- LOGO -->
    <div class="logo">
        <p>EST. 1971</p>
        <h3>THE ROYAL CHURCH</h3>
    </div>

    <!-- GLOW -->
    <div class="glow"></div>

    <!-- CONTENT -->
    <div class="content">
        <h1>DISCOVER EVENTS</h1>
        <p>Faith, fellowship, and inspiration</p>
    </div>

</div>

</body>
</html>
