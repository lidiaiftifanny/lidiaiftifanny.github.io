<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Landing</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Georgia', serif;
}

body, html{
    height:100%;
}

/* BACKGROUND UTAMA */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    background: url('rekomen bagrond.jpg') no-repeat center/cover;
}

/* OVERLAY GELAP */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(40,10,5,0.9));
}

/* EFFECT GLOW API */
.fire-glow{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 50% 30%, rgba(255,120,0,0.4), transparent 60%);
    mix-blend-mode: screen;
}

/* LOGO ATAS */
.header{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;
    color:#ddd;
    z-index:2;
    letter-spacing:2px;
}

.header h2{
    font-size:18px;
}

/* CARD PUTIH (BAGIAN BAWAH) */
.card{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    background:#f4efea;
    padding:50px;
    text-align:center;
    border-radius:4px;
    z-index:2;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* TEXT */
.card h1{
    font-size:38px;
    margin-bottom:20px;
    letter-spacing:2px;
}

.card p{
    font-size:20px;
    font-style:italic;
    color:#333;
    line-height:1.6;
}

/* SMALL TEXT */
.sub{
    margin-top:20px;
    font-size:12px;
    color:#777;
}

/* ANIMASI MASUK */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    animation:fadeUp 1.5s ease;
}

/* RESPONSIVE */
@media(max-width:768px){
    .card{
        width:90%;
        padding:30px;
    }

    .card h1{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="hero">

    <!-- OVERLAY API -->
    <div class="fire-glow"></div>

    <!-- HEADER -->
    <div class="header">
        <p>EST. 1971 IN NEW YORK</p>
        <h2>THE ROYAL CHURCH</h2>
    </div>

    <!-- CARD UTAMA -->
    <div class="card">
        <h1>DISCOVER EVENTS WHERE</h1>
        <p>
            faith, fellowship, AND community unite. <br>
            ALL ARE WELCOME!
        </p>

        <div class="sub">
            CHURCH AUTHORITY
        </div>
    </div>

</div>

</body>
</html>
